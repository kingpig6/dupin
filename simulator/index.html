<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>獨品工坊 · 安全帽彩繪模擬器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="appHeader">
  <div id="brand">獨品工坊 · 安全帽彩繪模擬器</div>
  <div class="hdr-right">
    <button class="btn btn-ghost share-btn" onclick="SimUI.shareUrl()">複製分享網址</button>
    <button class="hdr-toggle" onclick="SimUI.toggleHeader()" aria-label="收合頁眉">▾</button>
  </div>
</header>

<div class="layout">
  <!-- 預覽區 -->
  <div class="stage">
    <canvas id="helmetCanvas"></canvas>
    <div class="stage-hint">點擊帽體部位即可切換選取，再選色／材質</div>
  </div>

  <!-- 控制面板 -->
  <aside class="panel">
    <div>
      <div class="section-title">選擇部位</div>
      <div id="partTabs"></div>
    </div>

    <div>
      <div class="section-title">材質</div>
      <div class="mat-toggle">
        <button id="matMatte">一般色</button>
        <button id="matMetal">金屬色</button>
      </div>
    </div>

    <div>
      <div class="section-title">風格調色盤</div>
      <div id="palette"></div>
      <div class="swatch-label" id="swatchLabel"></div>
    </div>

    <div>
      <div class="section-title">自訂顏色</div>
      <div class="color-row">
        <input type="color" id="colorPicker" value="#C0C0C0">
        <input type="text" id="hexInput" maxlength="7" placeholder="#FFFFFF">
      </div>
    </div>

    <button class="btn btn-primary btn-block" onclick="SimUI.openOrder()">傳送訂單</button>
  </aside>
</div>

<!-- 色差提示 -->
<p class="disclaimer">※ 螢幕顯示顏色會因裝置而有偏差，僅供參考，實際以實體烤漆顏色為準。</p>

<!-- 下單表單 Modal -->
<div class="modal" id="orderModal">
  <form class="modal-card" onsubmit="SimUI.submitOrder(event)">
    <h3>傳送訂單</h3>
    <div class="field">
      <label>品名</label>
      <input type="text" id="fProduct" readonly>
    </div>
    <div class="field">
      <label>尺寸</label>
      <select id="fSize" required></select>
    </div>
    <div class="field">
      <label>指定店家</label>
      <select id="fStore" required></select>
    </div>
    <div class="field">
      <label>服務人員</label>
      <input type="text" id="fStaff" required>
    </div>
    <div class="field">
      <label>備註</label>
      <textarea id="fNote" rows="2"></textarea>
    </div>
    <div class="btn-row">
      <button type="button" class="btn btn-ghost btn-block" onclick="SimUI.closeOrder()">取消</button>
      <button type="submit" id="submitBtn" class="btn btn-primary btn-block">送出訂單</button>
    </div>
  </form>
</div>

<div id="toast"></div>

<script src="config.js"></script>
<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
