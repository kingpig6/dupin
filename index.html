<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>獨品工坊開單系統</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  body { background:#111827; color:#f3f4f6; font-family:'Noto Sans TC',sans-serif; }
  .tab-active { border-bottom:2px solid #f59e0b; color:#f59e0b; }
  .badge-進行中 { background:#1d4ed8; }
  .badge-完工交貨 { background:#15803d; }
  .badge-未收款 { background:#b91c1c; }
  .badge-收款訂金 { background:#92400e; }
  .badge-已收款 { background:#166534; }
  input,select,textarea {
    background:#1f2937; border:1px solid #374151; color:#f3f4f6;
    border-radius:6px; padding:8px 12px; width:100%;
  }
  input:focus,select:focus,textarea:focus {
    outline:none; border-color:#f59e0b;
  }
  .btn { padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer; border:none; }
  .btn-primary { background:#f59e0b; color:#111827; }
  .btn-danger  { background:#dc2626; color:#fff; }
  .btn-ghost   { background:#374151; color:#f3f4f6; }
  .card { background:#1f2937; border-radius:12px; padding:16px; margin-bottom:12px; }
  .section-title { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  @media print {
    body { background:#fff; color:#000; }
    .no-print { display:none !important; }
    .print-area { display:block !important; }
  }
  .print-area { display:none; }

  /* ── 傭金遊戲化 ── */
  .xp-card { background:#1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  .xp-top { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:10px; }
  .xp-lv-row { display:flex; align-items:center; gap:8px; }
  .lv-badge {
    width:34px; height:34px; border-radius:50%;
    background:conic-gradient(from 180deg, #fbbf24, #f59e0b, #7c5210, #f59e0b);
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:12px; color:#1a1204;
    box-shadow:0 0 0 3px #1f2937, 0 0 14px rgba(245,158,11,.5);
    flex-shrink:0;
  }
  .lv-name { font-size:13px; font-weight:700; color:#f3f4f6; }
  .xp-amt { font-size:24px; font-weight:800; color:#fbbf24; font-variant-numeric:tabular-nums; }
  .xp-track { height:18px; border-radius:999px; background:#0f172a; border:1px solid #374151; overflow:hidden; position:relative; }
  .xp-fill {
    height:100%; border-radius:999px; width:0%;
    background:linear-gradient(90deg, #7c5210, #f59e0b 55%, #fbbf24);
    position:relative; transition:width 1.1s cubic-bezier(.22,.9,.3,1);
  }
  .xp-fill::after {
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(115deg, rgba(255,255,255,.16) 0 8px, transparent 8px 16px);
    mix-blend-mode:overlay;
  }
  .xp-fill.maxed { background:linear-gradient(90deg, #b45309, #f59e0b, #fde68a, #f59e0b, #b45309); }
  .xp-sub { display:flex; justify-content:space-between; margin-top:6px; font-size:11px; color:#6b7280; }
  .xp-lastmonth { font-size:11px; color:#6b7280; margin-bottom:2px; }
  .xp-lastmonth b { color:#9ca3af; font-variant-numeric:tabular-nums; }
  .streak-badge {
    display:inline-flex; align-items:center; gap:4px; margin-top:8px;
    background:#3b1f06; border:1px solid #92400e; color:#fbbf24;
    font-size:11px; padding:3px 8px; border-radius:999px; font-weight:700;
  }

  .ring-card { background:#1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  .ring-row { display:flex; align-items:center; gap:18px; }
  .rank-ring { width:96px; height:96px; border-radius:50%; flex-shrink:0; position:relative; }
  .rank-ring::before { content:""; position:absolute; inset:11px; border-radius:50%; }
  .rank-ring::after {
    content:""; position:absolute; inset:24px; border-radius:50%; background:#1f2937;
  }
  .ring-center {
    position:absolute; inset:24px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1;
  }
  .ring-center b { font-size:15px; color:#fbbf24; font-variant-numeric:tabular-nums; }
  .ring-center span { font-size:9px; color:#6b7280; margin-top:2px; }
  .ring-legend { display:flex; flex-direction:column; gap:7px; font-size:12px; color:#d1d5db; }
  .ring-legend .dot { width:9px; height:9px; border-radius:2px; display:inline-block; margin-right:6px; }

  /* 數字滾動用 */
  .count-up { font-variant-numeric:tabular-nums; }

  /* 結款慶祝：金幣雨 */
  #coinRain { position:fixed; inset:0; pointer-events:none; z-index:100; overflow:hidden; }
  .coin {
    position:absolute; top:-40px; font-size:22px;
    animation:coinFall 1.8s cubic-bezier(.35,.6,.6,1) forwards;
  }
  @keyframes coinFall {
    0%   { transform:translateY(0) rotate(0deg); opacity:1; }
    100% { transform:translateY(110vh) rotate(360deg); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .xp-fill { transition:none; }
    .coin { animation:none; display:none; }
  }
</style>
</head>
<body>

<!-- ===== 頂部導覽 ===== -->
<header class="no-print sticky top-0 z-50 bg-gray-900 border-b border-gray-700 px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <button id="backBtn" onclick="goBack()" class="text-amber-400 text-xl hidden">←</button>
    <h1 id="pageTitle" class="text-amber-400 font-bold text-lg">獨品工坊</h1>
  </div>
  <div id="headerActions"></div>
</header>

<!-- ===== 主內容 ===== -->
<main id="app" class="no-print pb-20 px-4 pt-4 max-w-lg mx-auto"></main>

<!-- ===== 底部導覽 ===== -->
<nav class="no-print fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-700 flex">
  <button onclick="showView('orders')"    class="nav-btn flex-1 py-3 text-center text-xs" data-view="orders">
    <svg class="w-5 h-5 mx-auto mb-0.5 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>訂單
  </button>
  <button onclick="showView('newOrder')"  class="nav-btn flex-1 py-3 text-center text-xs" data-view="newOrder">
    <svg class="w-5 h-5 mx-auto mb-0.5 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>開單
  </button>
  <button onclick="showView('stats')"     class="nav-btn flex-1 py-3 text-center text-xs" data-view="stats">
    <svg class="w-5 h-5 mx-auto mb-0.5 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg><span id="statsNavLabel">業績</span>
  </button>
</nav>

<!-- ===== 請款單列印區 ===== -->
<div class="print-area" id="invoicePrint"></div>

<script src="app.js?v=61"></script>
</body>
</html>
